name: Generate K8s Cluster Dashboard

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Install System Dependencies (Git & Node.js)
        run: |
          sudo dnf install git nodejs -y

      - name: Set up Kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBERNETES_KUBECONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Ensure kubectl is installed
        run: |
          if ! command -v kubectl &> /dev/null; then
            curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x ./kubectl
            sudo mv ./kubectl /usr/local/bin/kubectl
          fi

      - name: Extract Data and Generate HTML
        run: |
          # 1. Fetch Cluster Metadata and Timestamp
          CLUSTER_INFO=$(kubectl cluster-info | head -n 2 | sed 's/\x1B\[[0-9;]*[JKmsu]//g')
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')

          # 2. Dump clean raw JSON data structures
          kubectl get nodes -o json > nodes.json
          kubectl get pods -A -o json > pods.json

          # 3. Process data using a robust, error-proof Python block
          python3 -c "
          import json
          from datetime import datetime, timezone

          current_time = datetime.now(timezone.utc)

          # Function to calculate relative age (e.g., 17d)
          def calculate_age(timestamp_str):
              try:
                  creation_time = datetime.strptime(timestamp_str, '%Y-%m-%dT%H:%M:%SZ').replace(tzinfo=timezone.utc)
                  diff = current_time - creation_time
                  if diff.days > 0:
                      return f'{diff.days}d'
                  hours = diff.seconds // 3600
                  if hours > 0:
                      return f'{hours}h'
                  minutes = (diff.seconds % 3600) // 60
                  return f'{minutes}m'
              except:
                  return '<unknown>'

          # --- PROCESS NODES ---
          node_rows = ''
          try:
              with open('nodes.json') as f:
                  nodes_data = json.load(f)
              for node in nodes_data.get('items', []):
                  name = node['metadata']['name']
                  
                  # Parse Status
                  status = 'Unknown'
                  for cond in node['status'].get('conditions', []):
                      if cond['type'] == 'Ready':
                          status = 'Ready' if cond['status'] == 'True' else 'NotReady'
                  
                  # Parse Roles Safely (Checks standard K8s role label structures)
                  labels = node['metadata'].get('labels', {})
                  role = 'worker'
                  for key in labels.keys():
                      if 'node-role.kubernetes.io/' in key:
                          role = key.split('/')[-1]
                      elif 'kubernetes.io/role' in key:
                          role = labels[key]
                  
                  # Calculate Relative Age (e.g., 17d) instead of raw timestamp strings
                  age = calculate_age(node['metadata']['creationTimestamp'])
                  version = node['status']['nodeInfo']['kubeletVersion']
                  
                  # Parse Internal IP safely
                  internal_ip = '<none>'
                  for addr in node['status'].get('addresses', []):
                      if addr['type'] == 'InternalIP':
                          internal_ip = addr['address']
                          
                  os_image = node['status']['nodeInfo']['osImage']
                  
                  node_rows += f'<tr><td><strong>{name}</strong></td><td><span class=\"badge badge-success\">{status}</span></td><td><code>{role}</code></td><td>{age}</td><td>{version}</td><td>{internal_ip}</td><td>{os_image}</td></tr>'
          except Exception as e:
              node_rows = f'<tr><td colspan=\"7\">Error parsing nodes: {str(e)}</td></tr>'

          # --- PROCESS PODS ---
          pod_rows = ''
          try:
              with open('pods.json') as f:
                  pods_data = json.load(f)
              for pod in pods_data.get('items', []):
                  if pod['status'].get('phase') != 'Running':
                      continue
                      
                  ns = pod['metadata']['namespace']
                  name = pod['metadata']['name']
                  
                  # Calculate Ready Containers String
                  container_statuses = pod['status'].get('containerStatuses', [])
                  ready_count = sum(1 for c in container_statuses if c.get('ready'))
                  total_count = len(pod['spec'].get('containers', []))
                  ready_str = f'{ready_count}/{total_count}'
                  
                  status = pod['status'].get('phase', 'Running')
                  
                  # Calculate Total Restarts
                  restarts = 0
                  if container_statuses:
                      restarts = sum(c.get('restartCount', 0) for c in container_statuses)
                      
                  # Direct node assignment lookup
                  node_assigned = pod['spec'].get('nodeName', '<none>')
                  
                  pod_rows += f'<tr><td><code>{ns}</code></td><td>{name}</td><td>{ready_str}</td><td><span class=\"badge badge-info\">{status}</span></td><td>{restarts}</td><td>{node_assigned}</td></tr>'
          except Exception as e:
              pod_rows = f'<tr><td colspan=\"6\">Error parsing pods: {str(e)}</td></tr>'

          # Write processed table lines back to runner environment
          with open('node_rows.txt', 'w') as f: f.write(node_rows)
          with open('pod_rows.txt', 'w') as f: f.write(pod_rows)
          "

          NODE_ROWS=$(cat node_rows.txt)
          POD_ROWS=$(cat pod_rows.txt)

          # 4. Generate the flawless dashboard HTML page
          cat <<EOF > index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Kubernetes Cluster Dashboard</title>
              <style>
                  :root {
                      --bg-color: #0f172a;
                      --card-bg: #1e293b;
                      --text-main: #f8fafc;
                      --text-muted: #94a3b8;
                      --primary: #38bdf8;
                      --border: #334155;
                      --success: #10b981;
                      --info: #0ea5e9;
                  }
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                      background-color: var(--bg-color);
                      color: var(--text-main);
                      margin: 0;
                      padding: 0;
                      display: flex;
                      flex-direction: column;
                      min-height: 100vh;
                  }
                  header {
                      background-color: var(--card-bg);
                      border-bottom: 1px solid var(--border);
                      padding: 1.5rem 2rem;
                      text-align: center;
                  }
                  header h1 { margin: 0; font-size: 1.8rem; color: var(--primary); letter-spacing: 0.5px; }
                  header p { margin: 0.5rem 0 0 0; color: var(--text-muted); font-size: 0.9rem; }
                  main { flex: 1; padding: 2rem; max-width: 1200px; margin: 0 auto; width: calc(100% - 4rem); }
                  .section-title { font-size: 1.3rem; margin-bottom: 1rem; color: var(--primary); border-left: 4px solid var(--primary); padding-left: 0.5rem; }
                  .card { background-color: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; margin-bottom: 2rem; overflow-x: auto; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
                  table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem; }
                  th { background-color: #111827; color: var(--primary); font-weight: 600; padding: 0.75rem 1rem; border-bottom: 2px solid var(--border); }
                  td { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); color: #e2e8f0; }
                  tr:hover { background-color: #24334d; }
                  code { background-color: #0f172a; padding: 0.2rem 0.4rem; border-radius: 4px; color: #f472b6; font-family: monospace; }
                  .badge { display: inline-block; padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
                  .badge-success { background-color: rgba(16, 185, 129, 0.2); color: var(--success); border: 1px solid var(--success); }
                  .badge-info { background-color: rgba(14, 165, 233, 0.2); color: var(--info); border: 1px solid var(--info); }
                  footer { background-color: var(--card-bg); border-top: 1px solid var(--border); text-align: center; padding: 1rem; font-size: 0.85rem; color: var(--text-muted); font-weight: 500; }
              </style>
          </head>
          <body>
              <header>
                  <h1>Kubernetes Cluster Live Info Dashboard</h1>
                  <p>Generated on: $TIMESTAMP</p>
              </header>
              <main>
                  <div class="section-title">Cluster Context Info</div>
                  <div class="card"><p style="margin:0; font-family:monospace; color:#38bdf8;">$CLUSTER_INFO</p></div>
                  
                  <div class="section-title">Cluster Infrastructure Nodes</div>
                  <div class="card">
                      <table>
                          <thead>
                              <tr>
                                  <th>Node Name</th>
                                  <th>Status</th>
                                  <th>Role</th>
                                  <th>Age</th>
                                  <th>Kubelet Version</th>
                                  <th>Internal IP</th>
                                  <th>OS Image</th>
                              </tr>
                          </thead>
                          <tbody>
                              $NODE_ROWS
                          </tbody>
                      </table>
                  </div>
                  
                  <div class="section-title">Active Running Pods (All Namespaces)</div>
                  <div class="card">
                      <table>
                          <thead>
                              <tr>
                                  <th>Namespace</th>
                                  <th>Pod Name</th>
                                  <th>Ready</th>
                                  <th>Status</th>
                                  <th>Restarts</th>
                                  <th>Assigned Node</th>
                              </tr>
                          </thead>
                          <tbody>
                              $POD_ROWS
                          </tbody>
                      </table>
                  </div>
              </main>
              <footer>sivahari's test platform</footer>
          </body>
          </html>
          EOF

          # Clean up temporary buffers
          rm -f nodes.json pods.json node_rows.txt pod_rows.txt

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages Direct
        uses: actions/deploy-pages@v4
